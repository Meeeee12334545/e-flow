version: '3.8'

# Shared internal network — services communicate without exposing extra ports.
networks:
  e-flow-net:
    driver: bridge

services:
  # ── Data-collection service (monitor only — no dashboard) ──────────────────
  monitor:
    build: .
    container_name: e-flow-monitor
    command: python monitor.py
    restart: unless-stopped
    networks:
      - e-flow-net
    volumes:
      - ./data:/app/data
      - ./monitor.log:/app/monitor.log
    environment:
      - MONITOR_ENABLED=true
      - MONITOR_INTERVAL=60
      # API-only mode: no headless browser launched, minimises RAM on small droplets
      - SCRAPER_FORCE_REQUESTS=1
      - TIMEZONE=Australia/Brisbane
      - DATABASE_PATH=/app/data/flow_data.db
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "health.py"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Dashboard service (Streamlit only — reads shared DB) ───────────────────
  dashboard:
    build: .
    container_name: e-flow-dashboard
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - e-flow-net
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    # Wait for monitor to pass its healthcheck before starting the dashboard
    # so the SQLite DB is fully initialized before the UI tries to open it.
    depends_on:
      monitor:
        condition: service_healthy
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - DATABASE_PATH=/app/data/flow_data.db
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Standalone all-in-one (supervisord: monitor + dashboard in one container)
  # Ideal for a single DigitalOcean droplet: `docker-compose --profile standalone up -d`
  standalone:
    build: .
    container_name: e-flow-standalone
    # CMD defaults to supervisord — no override needed
    restart: unless-stopped
    networks:
      - e-flow-net
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./monitor.log:/app/monitor.log
    environment:
      - MONITOR_ENABLED=true
      - MONITOR_INTERVAL=60
      - SCRAPER_FORCE_REQUESTS=1
      - TIMEZONE=Australia/Brisbane
      - DATABASE_PATH=/app/data/flow_data.db
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONUNBUFFERED=1
    profiles:
      - standalone
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
